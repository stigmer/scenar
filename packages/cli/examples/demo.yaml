viewport:
  width: 896
  height: 540
steps:
  - view: new-session
    delay_ms: 0
    caption: "Start here"
    narration_text: "Let's walk through the setup."
  - view: settings-api-keys
    delay_ms: 1500
    caption: "Your API keys"
    interactions:
      - at_percent: 0.3
        type: hover
        target: create-api-key
        hover_config:
          hover_duration_ms: 1500
  - view: create-form
    delay_ms: 2500
    caption: "Name your key"
    interactions:
      - at_percent: 0.15
        type: type
        target: apikey-name-input
        type_config:
          text: "quickstart-key"
