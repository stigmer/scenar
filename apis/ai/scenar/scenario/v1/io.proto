syntax = "proto3";

package ai.scenar.scenario.v1;

import "ai/scenar/commons/rpc/pagination.proto";
import "ai/scenar/scenario/v1/api.proto";
import "buf/validate/validate.proto";

// ScenarioId identifies a scenario by its unique identifier.
message ScenarioId {
  // Unique identifier of the scenario resource.
  string value = 1 [(buf.validate.field).string.min_len = 1];
}

// Scenarios contains a list of scenario resources.
message Scenarios {
  // Scenario entries.
  repeated Scenario entries = 1;
}

// ListScenariosInput specifies filters for listing scenarios.
message ListScenariosInput {
  // Filter by tags. When non-empty, only scenarios matching ALL
  // specified tags are returned (AND semantics).
  repeated string tags = 1;

  // Pagination parameters.
  ai.scenar.commons.rpc.PageInfo page = 2;
}

// ScenarioOutputFormat specifies the output format for scenario rendering.
enum ScenarioOutputFormat {
  // Default value. The service chooses the appropriate format.
  output_format_unspecified = 0;

  // Interactive web embed — a live React component tree that the viewer
  // can play, pause, and scrub through. This is the primary format for
  // documentation sites and landing pages.
  interactive_embed = 1;

  // Pixel-perfect MP4 video produced by the Remotion pipeline. Suitable
  // for social media, presentations, and contexts where interactive
  // embeds are not supported.
  mp4_video = 2;
}

// RenderInput specifies which scenario to render and in what format.
message RenderInput {
  // Identifier of the scenario to render.
  string scenario_id = 1 [(buf.validate.field).string.min_len = 1];

  // Desired output format.
  ScenarioOutputFormat format = 2 [(buf.validate.field).enum.defined_only = true];
}

// RenderOutput contains the result of a render operation.
message RenderOutput {
  // URL of the rendered artifact (e.g., a hosted interactive embed
  // or an MP4 video file).
  string artifact_url = 1;

  // The format of the rendered artifact.
  ScenarioOutputFormat format = 2;
}
