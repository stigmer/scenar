syntax = "proto3";

package ai.scenar.scenario.v1;

import "ai/scenar/commons/resource/metadata.proto";
import "ai/scenar/commons/resource/status.proto";
import "ai/scenar/scenario/v1/spec.proto";
import "buf/validate/validate.proto";
import "google/protobuf/timestamp.proto";

// Scenario is the top-level resource representing a declarative demo
// definition. It follows a Kubernetes-inspired resource pattern with
// api_version, kind, metadata, spec, and status fields.
//
// A Scenario fully describes a visual walkthrough: the ordered sequence
// of component views, the cursor choreography within each step, viewport
// configuration, and narration scripts. The same Scenario definition
// drives both interactive web embeds (browser playback) and pixel-perfect
// MP4 video exports (Remotion pipeline).
//
// Scenarios are authored in YAML or TypeScript (using generated types)
// and validated against this proto schema. The ScenarioSpec is the core —
// it defines what the viewer sees. Metadata provides identity and
// categorization. Status tracks build-time state.
//
// Example YAML:
//   apiVersion: scenar.ai/v1
//   kind: Scenario
//   metadata:
//     name: API Key Setup
//     slug: api-key-setup
//     visibility: visibility_public
//     tags: [quickstart, authentication]
//   spec:
//     viewport:
//       width: 896
//       height: 540
//     steps:
//       - view: new-session
//         delay_ms: 0
//         caption: "Start here"
//       - view: settings-api-keys
//         delay_ms: 1500
//         caption: "Your API keys"
//         interactions:
//           - at_percent: 0.3
//             type: hover
//             target: create-api-key
message Scenario {
  // API version for this resource type.
  string api_version = 1 [(buf.validate.field).string.const = 'scenar.ai/v1'];

  // Resource kind identifier.
  string kind = 2 [(buf.validate.field).string.const = 'Scenario'];

  // Standard resource metadata including name, slug, id, visibility,
  // labels, annotations, tags, and version information.
  ai.scenar.commons.resource.ResourceMetadata metadata = 3;

  // The scenario definition — steps, interactions, and viewport config.
  ScenarioSpec spec = 4 [(buf.validate.field).required = true];

  // System-managed build state and audit trail. Populated by the
  // engine/pipeline, not by the scenario author.
  ScenarioStatus status = 5;
}

// ScenarioStatus contains system-managed state for a Scenario resource.
// Populated by the engine or hosting service — not authored directly.
//
// Combines domain-specific fields (rendering state, validation) with
// the standard audit trail (who created/updated and when).
message ScenarioStatus {
  // Standard audit trail tracking creation and modification.
  ai.scenar.commons.resource.ResourceAudit audit = 99;

  // Timestamp of the most recent render (interactive embed build or
  // video export). Used for cache invalidation and staleness detection.
  google.protobuf.Timestamp last_rendered_at = 1;

  // Whether this scenario has been validated against the engine's
  // runtime requirements (all view identifiers resolve, interaction
  // targets exist, timing budgets are satisfied).
  bool validated = 2;
}
