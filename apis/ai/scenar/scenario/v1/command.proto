syntax = "proto3";

package ai.scenar.scenario.v1;

import "ai/scenar/commons/resource/rpc_service_options.proto";
import "ai/scenar/scenario/v1/api.proto";
import "ai/scenar/scenario/v1/io.proto";

// ScenarioCommandController provides write operations for scenario resources.
//
// This service defines the API surface for a future hosted Scenar service.
// In the initial local/build-time usage, scenarios are authored as YAML or
// TypeScript files and processed by the Scenar CLI and SDK — these RPCs
// are not called directly. The service contract is forward-looking so that
// the transition from local tooling to a hosted platform is seamless.
//
// No authorization annotations are defined initially. When Scenar becomes
// a hosted service, auth configuration will be added per-RPC.
service ScenarioCommandController {
  option (ai.scenar.commons.resource.resource_kind) = scenario;

  // Create a new scenario.
  //
  // Accepts a full Scenario resource and returns the created resource
  // with system-populated fields (metadata.id, status).
  rpc create(Scenario) returns (Scenario);

  // Update an existing scenario.
  //
  // Accepts a full Scenario resource with the target metadata.id set.
  // Returns the updated resource. Only the spec and mutable metadata
  // fields (name, description, tags) can be changed.
  rpc update(Scenario) returns (Scenario);

  // Delete a scenario by its identifier.
  //
  // Returns the deleted resource for confirmation. Deletion is
  // permanent — there is no soft-delete or trash mechanism.
  rpc delete(ScenarioId) returns (Scenario);

  // Render a scenario into the specified output format.
  //
  // For interactive_embed: produces a deployable web component bundle.
  // For mp4_video: produces a pixel-perfect video via the Remotion pipeline.
  //
  // This is a potentially long-running operation — video rendering
  // may take seconds to minutes depending on scenario length and
  // complexity. In a hosted service, this would return a job/operation
  // resource for polling. The initial contract uses a simple
  // request/response for simplicity.
  rpc render(RenderInput) returns (RenderOutput);
}
