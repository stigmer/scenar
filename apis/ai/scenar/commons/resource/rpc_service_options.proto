syntax = "proto3";

package ai.scenar.commons.resource;

import "ai/scenar/commons/resource/kind.proto";
import "google/protobuf/descriptor.proto";

// Service-level option that tags a gRPC service with the resource kind
// it manages. Used by codegen and runtime routing to associate command
// and query controllers with their resource type.
extend google.protobuf.ServiceOptions {
  ResourceKind resource_kind = 91100;
}
