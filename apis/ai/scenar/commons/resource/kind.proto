syntax = "proto3";

package ai.scenar.commons.resource;

// ResourceKind identifies the type of a Scenar resource.
//
// Used by service options (rpc_service_options.proto) to tag command
// and query controllers with the resource they manage. Extensible as
// Scenar adds new resource types beyond Scenario.
enum ResourceKind {
  // Default value when no resource kind is set.
  resource_kind_unspecified = 0;

  // A declarative scenario definition — steps, interactions,
  // viewport config, and narration scripts.
  scenario = 1;
}
