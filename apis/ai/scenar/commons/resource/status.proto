syntax = "proto3";

package ai.scenar.commons.resource;

import "google/protobuf/timestamp.proto";

// ResourceAuditStatus contains system-managed audit information for
// a resource. Used as the base status type for resources that only
// need audit tracking without domain-specific status fields.
message ResourceAuditStatus {
  // Audit information tracking creation and modification.
  ResourceAudit audit = 99;
}

// ResourceAudit contains both spec-level and status-level audit details.
//
// The spec audit tracks changes to the resource's desired state
// (authored by users). The status audit tracks changes to the
// resource's system-managed state (computed by the engine/service).
message ResourceAudit {
  // Audit info for the resource's specification (desired state).
  ResourceAuditInfo spec_audit = 1;

  // Audit info for the resource's status (actual state).
  ResourceAuditInfo status_audit = 2;
}

// ResourceAuditInfo contains detailed audit information for a single
// aspect (spec or status) of a resource.
message ResourceAuditInfo {
  // Actor who created this resource.
  ResourceAuditActor created_by = 1;

  // Timestamp when the resource was created.
  google.protobuf.Timestamp created_at = 2;

  // Actor who last updated this resource.
  ResourceAuditActor updated_by = 3;

  // Timestamp when the resource was last updated.
  google.protobuf.Timestamp updated_at = 4;

  // Type of the last event (e.g., "created", "updated").
  string event = 5;
}

// ResourceAuditActor represents the entity that performed an action.
message ResourceAuditActor {
  // Unique identifier of the actor.
  string id = 1;

  // URL to the actor's avatar image.
  string avatar = 2;
}
