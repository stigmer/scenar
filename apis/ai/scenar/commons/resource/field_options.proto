syntax = "proto3";

package ai.scenar.commons.resource;

import "google/protobuf/descriptor.proto";

// Field-level options for Scenar resource fields.
//
// These annotations communicate field semantics to codegen, SDKs, and
// UIs — e.g., that a field is system-generated and should not be set
// by the user, or that a field is immutable after creation.
extend google.protobuf.FieldOptions {
  // Marks a field as computed/read-only. Computed fields are populated
  // by the system (engine or service) and should not be set by the
  // resource author. Examples: id, slug (when auto-generated).
  bool computed = 91201;

  // Marks a field as immutable after creation. The field can be set
  // in the initial create request but cannot be changed by subsequent
  // updates. Examples: api_version, kind.
  bool immutable = 91202;
}
